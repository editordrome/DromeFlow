<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <!-- Favicons para diferentes contextos -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https://*.facebook.com;
                 img-src 'self' data: blob: https:;
                 media-src 'self' blob: https:;
                 script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://connect.facebook.net;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com;
                 frame-src 'self' https://*.facebook.com;
                 connect-src 'self' https://*.supabase.co wss://*.supabase.co https://app.paineldromedario.top https://brasilapi.com.br https://app-utalk.umbler.com https://*.facebook.com;">

  <title>DromeFlow</title>

  <!-- Fontes Premium & Acessíveis -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      /* Cores de Acento e Ação (Tema Claro) */
      --accent-primary: #ac009e;
      --accent-secondary: #fd24a0;
      /* Alias usado como fallback no stripe lateral dos cards */
      --color-accent-primary: var(--accent-primary);

      /* Cores Semânticas */
      --success-color: #70e000;
      --warning-color: #f88f0b;
      --danger-color: #ef476f;
      --info-color: #00d5ff;

      /* Paleta de Cores Adicional */
      --brand-magenta: #ccff33;
      --brand-pink: #fd24a0;
      --brand-lime: #ccff33;
      --brand-green: #70e000;
      --brand-cyan: #00d5ff;
      --brand-orange: #f88f0b;
      --brand-dark-blue: #010d32;
      --brand-snow-white: #fffafa;

      /* Tema Claro (Padrão) */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;

      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-accent: var(--accent-primary);
      --text-on-accent: #ffffff;

      --border-primary: #e2e8f0;
      --border-secondary: #cbd5e1;
      --border-accent: var(--accent-primary);

      /* Estados de Foco */
      --focus-ring-color: #ac009e;

      /* Sombras */
      --shadow-color-rgb: 30, 41, 59;
      --shadow-sm: 0 1px 3px rgba(var(--shadow-color-rgb), 0.05);
      --shadow-md: 0 2px 8px rgba(var(--shadow-color-rgb), 0.08);
      --shadow-lg: 0 4px 16px rgba(var(--shadow-color-rgb), 0.12);

      /* Layout */
      --border-radius-sm: 8px;
      --border-radius: 10px;
      --border-radius-lg: 16px;
    }

    /* Estilos para conteúdo HTML injetado */
    .prose h2 {
      color: var(--text-primary);
    }

    .prose p {
      color: var(--text-secondary);
    }

    .prose strong {
      color: var(--text-primary);
    }

    .prose ul>li::before {
      background-color: var(--text-secondary);
    }

    /* Animação para UpdatePrompt */
    @keyframes slide-up {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slide-up 0.3s ease-out;
    }
  </style>
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind CSS is configured via CDN with custom theme -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          },
          colors: {
            'accent-primary': 'var(--accent-primary)',
            'accent-secondary': 'var(--accent-secondary)',
            'success': 'var(--success-color)',
            'warning': 'var(--warning-color)',
            'danger': 'var(--danger-color)',
            'info': 'var(--info-color)',
            'brand-magenta': 'var(--brand-magenta)',
            'brand-pink': 'var(--brand-pink)',
            'brand-lime': 'var(--brand-lime)',
            'brand-green': 'var(--brand-green)',
            'brand-cyan': 'var(--brand-cyan)',
            'brand-orange': 'var(--brand-orange)',
            'brand-dark-blue': 'var(--brand-dark-blue)',
            'brand-snow-white': 'var(--brand-snow-white)',
            'bg-primary': 'var(--bg-primary)',
            'bg-secondary': 'var(--bg-secondary)',
            'bg-tertiary': 'var(--bg-tertiary)',
            'text-primary': 'var(--text-primary)',
            'text-secondary': 'var(--text-secondary)',
            'text-accent': 'var(--text-accent)',
            'text-on-accent': 'var(--text-on-accent)',
            'border-primary': 'var(--border-primary)',
            'border-secondary': 'var(--border-secondary)',
            'border-accent': 'var(--border-accent)',
          },
          boxShadow: {
            'sm': '0 1px 2px 0 rgba(0, 0, 0, 0.05)',
            'DEFAULT': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
            'md': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
            'lg': '0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05)',
            'xl': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
            '2xl': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
            'inner': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
            'button': '0 4px 14px 0 rgba(var(--accent-primary-rgb), 0.39)',
          },
          borderRadius: {
            sm: 'var(--border-radius-sm)',
            DEFAULT: 'var(--border-radius)',
            lg: 'var(--border-radius-lg)',
            'xl': '20px',
            '2xl': '24px',
            '3xl': '32px',
          },
          ringColor: {
            DEFAULT: 'var(--focus-ring-color)',
          }
        }
      }
    }
  </script>

</head>

<body class="bg-bg-primary text-text-primary">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
