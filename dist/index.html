  <style>
    :root {
      /* Cores de Acento e Ação (Tema Claro) */
      --accent-primary: #ac009e;
      --accent-secondary: #fd24a0;
      /* Alias usado como fallback no stripe lateral dos cards */
      --color-accent-primary: var(--accent-primary);

      /* Cores Semânticas */
      --success-color: #70e000;
      --warning-color: #f88f0b;
      --danger-color: #ef476f;
      --info-color: #00d5ff;

      /* Paleta de Cores Adicional */
      --brand-magenta: #ccff33;
      --brand-pink: #fd24a0;
      --brand-lime: #ccff33;
      --brand-green: #70e000;
      --brand-cyan: #00d5ff;
      --brand-orange: #f88f0b;
      --brand-dark-blue: #010d32;
      --brand-snow-white: #fffafa;

      /* Tema Claro (Padrão) */
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;

      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-accent: var(--accent-primary);
      --text-on-accent: #ffffff;

      --border-primary: #e2e8f0;
      --border-secondary: #cbd5e1;
      --border-accent: var(--accent-primary);

      /* Estados de Foco */
      --focus-ring-color: #ac009e;

      /* Sombras */
      --shadow-color-rgb: 30, 41, 59;
      --shadow-sm: 0 1px 3px rgba(var(--shadow-color-rgb), 0.05);
      --shadow-md: 0 2px 8px rgba(var(--shadow-color-rgb), 0.08);
      --shadow-lg: 0 4px 16px rgba(var(--shadow-color-rgb), 0.12);

      /* Layout */
      --border-radius-sm: 8px;
      --border-radius: 10px;
      --border-radius-lg: 16px;
    }

    /* Estilos para conteúdo HTML injetado */
    .prose h2 {
      color: var(--text-primary);
    }

    .prose p {
      color: var(--text-secondary);
    }

    .prose strong {
      color: var(--text-primary);
    }

    .prose ul>li::before {
      background-color: var(--text-secondary);
    }

    /* Animação para UpdatePrompt */
    @keyframes slide-up {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-up {
      animation: slide-up 0.3s ease-out;
    }
  </style>
